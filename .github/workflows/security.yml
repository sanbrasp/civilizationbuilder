name: Security Scan

on: 
  push: 
    branches: [ "**" ]
  pull_request: 
    branches: [ main ]

jobs: 
  secret-scan: 
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
        with: 
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2